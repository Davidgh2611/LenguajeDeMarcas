<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Avanzado - Validaciones</title>
    <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>
    <div class="form-container">
        <form id="registro-form" class="formulario">
            <h2>Crear Cuenta</h2>

            <div class="form-group" id="grupo__usuario">
                <label for="usuario">Nombre de Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="juan_perez">
                <span class="mensaje-error">El usuario debe tener de 4 a 16 dígitos y solo números, letras y guion bajo.</span>
            </div>

            <div class="form-group" id="grupo__correo">
                <label for="correo">Correo Electrónico</label>
                <input type="text" id="correo" name="correo" placeholder="correo@ejemplo.com">
                <span class="mensaje-error">Introduce un correo válido (ejemplo@dominio.com).</span>
            </div>

            <div class="form-group" id="grupo__password">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password">
                <span class="mensaje-error">La contraseña debe tener al menos 8 caracteres.</span>
            </div>

            <div class="form-group" id="grupo__telefono">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono" placeholder="600123456">
                <span class="mensaje-error">El teléfono debe contener 9 números exactos.</span>
            </div>

            <button type="submit" class="btn-enviar">Registrarse</button>
        </form>
    </div>
    <script src="src/js/main.js"></script>
</body>
</html>
